    <!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBA - Zihin Dünyası Denetimi</title>
    <style>
        :root { 
            --kba-ana: #1b4d3e; 
            --kba-beyaz: #ffffff; 
            --kba-zemin: #f8faf8; 
            --whatsapp: #25d366; 
            --uyari: #d35400;
        }
        body { 
            font-family: 'Georgia', serif; 
            background-color: var(--kba-zemin); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            color: var(--kba-ana); 
        }
        .kapsayici { 
            background: var(--kba-beyaz); 
            width: 90%; 
            max-width: 420px; 
            border-radius: 25px; 
            border: 1px solid rgba(27,77,62,0.2); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.06); 
            padding: 35px; 
            text-align: center; 
        }
        .ust-bolum { 
            border-bottom: 1.5px solid var(--kba-ana); 
            margin-bottom: 25px; 
            padding-bottom: 15px; 
        }
        h1 { font-size: 34px; margin: 0; letter-spacing: 6px; font-weight: 400; }
        .alt-baslik { font-size: 11px; letter-spacing: 1px; margin-top: 5px; }
        
        input { 
            width: 100%; 
            padding: 14px; 
            margin: 15px 0; 
            border: 1.5px solid #ddd; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
        }
        
        .btn-aksiyon { 
            background: var(--kba-ana); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            font-size: 17px; 
            font-weight: 600; 
            letter-spacing: 1px; 
            transition: 0.3s; 
        }
        .btn-aksiyon:hover { background: #25614d; transform: translateY(-2px); }
        
        .analiz-sonuc { 
            margin-top: 25px; 
            padding: 20px; 
            display: none; 
            text-align: left; 
            border-radius: 15px; 
            border-left: 8px solid; 
            animation: ortayaCik 0.6s ease; 
            line-height: 1.7; 
        }
        
        .tavsiye-box { 
            margin-top: 15px; 
            padding: 12px; 
            background: rgba(255,255,255,0.7); 
            border-radius: 8px; 
            font-style: italic; 
            font-size: 14px; 
            color: #444; 
            border: 1px dashed #ccc; 
        }
        
        .uyari-notu { 
            color: var(--uyari); 
            font-weight: bold; 
            font-size: 13px; 
            margin-top: 15px; 
            border-top: 1px solid #eee; 
            padding-top: 10px; 
        }
        
        .whatsapp-box { 
            margin-top: 25px; 
            padding: 15px; 
            background: #e7f9ee; 
            border-radius: 15px; 
            display: none; 
            border: 1px solid var(--whatsapp); 
            animation: ortayaCik 0.8s ease; 
        }
        
        .btn-wa { 
            background: var(--whatsapp); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            text-decoration: none; 
            display: inline-block; 
            margin-top: 10px; 
            text-align: center; 
        }
        
        @keyframes ortayaCik { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        
        .cikis-link { 
            background:none; 
            border:none; 
            text-decoration:underline; 
            cursor:pointer; 
            color:#bbb; 
            margin-top:25px; 
            font-size: 13px; 
        }
        
        .copyright { font-size: 10px; margin-top: 30px; color: #999; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="kapsayici">
    <div class="ust-bolum">
        <h1>KBA</h1>
        <div class="alt-baslik">KENDİLİK BİLİNCİ AKADEMİSİ</div>
    </div>

    <div id="girisEkrani">
        <input type="text" id="kullaniciAdi" placeholder="İsminizi Yazın...">
        <button class="btn-aksiyon" onclick="sistemiBaslat()">SİSTEME GİRİŞ</button>
    </div>

    <div id="islemEkrani" style="display:none;">
        <p id="karsilama" style="font-size: 18px; font-weight: 600;"></p>
        <button class="btn-aksiyon" onclick="zihinAnaliziYap()">ZİHİN DÜNYAMI DENETLE</button>
        
        <div id="analizKutusu" class="analiz-sonuc"></div>
        
        <div id="whatsappKutusu" class="whatsapp-box">
            <div style="font-size: 13px; color: #1b4d3e; font-weight: bold;">🔍 Derinlemesine Analiz İstiyor musunuz?</div>
            <div style="font-size: 12px; color: #555; margin-top: 5px;">Kişisel döngülerinizi keşfetmek ve bu yapıyı dönüştürmek için KBA Danışmanlık Hattı ile irtibata geçebilirsiniz.</div>
            <a href="https://wa.me/905069763232" target="_blank" class="btn-wa">WhatsApp İle İletişime Geç</a>
        </div>

        <button class="cikis-link" onclick="location.reload()">Sistemden Çıkış Yap</button>
    </div>

    <div class="copyright">© 2026 KBA - TÜM HAKLARI MAHFUZDUR</div>
</div>

<script>
    let ebcedDegeri = 0;
    const db = { "süleyman": 191, "emine": 106, "derya": 215, "selman": 181, "ayşe": 377 };
    
    const hikmetler = [
        { ad: "Güneş", ebced: 400, marifet: "Yetim hakkını korumalısın." },
        { ad: "Kamer", ebced: 441, marifet: "Ana babaya tevazulu yaklaşıp yumuşak konuşmalısın." },
        { ad: "Merih", ebced: 131, marifet: "Dosdoğru olmak adına hareket etmelisin." },
        { ad: "Utarid", ebced: 566, marifet: "İnsanların hakkını korumalısın." },
        { ad: "Müşteri", ebced: 444, marifet: "Olaylar hakkında ince fikirli olmalısın." },
        { ad: "Zühre", ebced: 566, marifet: "Emanete riayet etmeli ve ihanet etmemelisin." },
        { ad: "Zühal", ebced: 496, marifet: "İşin sonunu düşünerek hareket etmelisin." }
    ];

    const zaaflar = {
        1: { metin: "Olaylara düz mantıkla bakıyorsun.", tavsiye: "Gördüğünün ötesindeki hikmeti fark etmek için zihnini sakinleştir ve acele karar verme." },
        2: { metin: "Çıkarcı ve kendi menfaatini gözeten bir zihin yapısındasın.", tavsiye: "Kendi yararından önce, bütünün hayrını gözetmek zihnindeki bu düğümü çözecektir." },
        3: { metin: "Hırsızlık zannı; bir şeylerin çalınacağı hırsıyla bakıyorsun.", tavsiye: "Sana ait olanın senden gitmeyeceğini, rızkın ve emanetin sahibini hatırla." },
        4: { metin: "Duygusal bir hayır beklentisiyle olayları tek taraflı yorumluyorsun.", tavsiye: "Beklentini insandan değil haktan yana tut; hayır, senin dilediğin değil, olanın içindedir." },
        5: { metin: "Şer ve kötü olacak bakış açısıyla yaklaşıyorsun.", tavsiye: "Korkularını bir kenara bırak; zannını güzele çek ki gerçeklik de hayra dönüşsün." },
        6: { metin: "'Ne derler' düşüncesi ve duygusal yoğunlukla bakıyorsun.", tavsiye: "İnsanların bakışını değil, kendi vicdanının sesini merkeze alarak özgürleş." },
        7: { metin: "Hatalı bir zeminde, tek taraflı bir muhabbet arayışındasın.", tavsiye: "İlişkilerinde samimiyeti, yanlış beklentiler üzerine değil dürüstlük üzerine inşa et." }
    };

    function sistemiBaslat() {
        let isim = document.getElementById('kullaniciAdi').value.trim().toLowerCase();
        if(!isim) return;
        
        if(db[isim]) {
            ebcedDegeri = db[isim];
        } else {
            let sor = prompt(isim + " ismi için ebced değerini girin:");
            if(!sor || isNaN(sor)) return;
            ebcedDegeri = parseInt(sor);
        }

        document.getElementById('girisEkrani').style.display = 'none';
        document.getElementById('islemEkrani').style.display = 'block';
        document.getElementById('karsilama').innerText = "Hoş Geldin, " + isim.toUpperCase();
    }

    function zihinAnaliziYap() {
        const suAn = new Date();
        const kutu = document.getElementById('analizKutusu');
        const waKutusu = document.getElementById('whatsappKutusu');
        
        let sira = (suAn.getDay() + suAn.getHours()) % 7;
        let gezegen = hikmetler[sira];
        let evre = (suAn.getSeconds() % 2 === 0) ? "Olur" : "Sıkıntılı";
        let mod7 = (ebcedDegeri + gezegen.ebced) % 7;
        if(mod7 === 0) mod7 = 7;

        kutu.style.display = "block";
        waKutusu.style.display = "block";

        if(evre === "Olur") {
            kutu.style.backgroundColor = "#effaf1"; 
            kutu.style.borderColor = "#27ae60";
            kutu.innerHTML = `
                <strong style="color:#1b4d3e">ZİHİN DURUMU (Dengeli):</strong><br>
                Şu an zihnindeki işleyiş mantığı: <b>"${gezegen.marifet}"</b> ilkesiyle uyumlu ve dengeli.
            `;
        } else {
            kutu.style.backgroundColor = "#fff9f0"; 
            kutu.style.borderColor = "#e67e22";
            kutu.innerHTML = `
                <strong style="color:#d35400">ZİHİN DURUMU (Hatalı Bakış):</strong><br>
                Zihnin şu an <b>"${zaaflar[mod7].metin}"</b> tuzağına düşmüş durumda.<br>
                <div class="tavsiye-box"><b>Yapıcı Öneri:</b> ${zaaflar[mod7].tavsiye}</div>
                <div class="uyari-notu">Duygusal yaklaşımlar sorunu çözmez, aksine büyütür. Lütfen itidalin getirisi olan erdemli davranışları tercih edin.</div>
                <br><strong>DÜZELTME İLKESİ:</strong> ${gezegen.marifet}
            `;
        }
    }
</script>
</body>
</html>
